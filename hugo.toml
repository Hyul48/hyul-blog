baseURL = "https://hyul48.github.io/hyul-blog/"
languageCode = "ko"
title = "Hyulmonologue"
theme = "PaperMod"

enableRobotsTXT = true
[pagination]
  pagerSize = 10

[taxonomies]
  tag = "tags"
  category = "categories"
  series = "series"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false
    lineNos = true

[params]
  defaultTheme = "auto"
  ShowToc = true
  TocOpen = true
  ShowCodeCopyButtons = true
  ShowReadingTime = true
  ShowBreadCrumbs = true
  ShowPostNavLinks = true
  ShowShareButtons = true
  mainSections = ["papers", "notes", "code", "projects"]
  comments = true

  # ✅ 수식(KaTeX) — PaperMod가 지원
  math = true

  # ✅ 검색(검색 버튼 + 인덱스 생성)
  ShowSearch = true

  [params.homeHero]
    title = "Microwave Sensing and Imaging"
    intro = "Top Down studying"
    primaryButtonText = "Browse Projects"
    primaryButtonURL = "/projects/"
    secondaryButtonText = "Read Papers"
    secondaryButtonURL = "/papers/"

  [params.sidebarProfile]
    name = "Hyul"
    
    location = "Gwangju, GIST"
    email = "donghyul@gm.gist.com"
    summary = "Interested in AI, inverse problems, computational electromagnetics, and learning in public."
    focusTitle = "Current Focus"
    focusItems = ["AI(PINN)", "electromagnetics", "Julia", "DSP"]

  [params.giscus]
    repo = "Hyul48/hyul-blog"
    repoID = "R_kgDOQzUq4A"
    category = "Announcements"
    categoryID = "DIC_kwDOQzUq4M4C7w30"
    mapping = "pathname"
    strict = "0"
    reactionsEnabled = "1"
    emitMetadata = "0"
    inputPosition = "bottom"
    theme = "preferred_color_scheme"
    lang = "ko"
    loading = "lazy"

[outputs]
  home = ["HTML", "RSS", "JSON"]  # 검색용 JSON 필요

[[menu.main]]
  name = "Papers"
  url = "/papers/"
  weight = 1

[[menu.main]]
  name = "Notes"
  url = "/notes/"
  weight = 2

[[menu.main]]
  name = "Code"
  url = "/code/"
  weight = 3

[[menu.main]]
  name = "Projects"
  url = "/projects/"
  weight = 4

[[menu.main]]
  name = "Search"
  url = "/search/"
  weight = 9
