baseURL = "https://hyul48.github.io/hyul-blog/"
languageCode = "ko"
title = "Hyulmonologue"
theme = "PaperMod"

enableRobotsTXT = true
[pagination]
  pagerSize = 10

[taxonomies]
  tag = "tags"
  category = "categories"
  series = "series"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false
    lineNos = true

[params]
  defaultTheme = "auto"
  ShowToc = true
  TocOpen = true
  ShowCodeCopyButtons = true
  ShowReadingTime = true
  ShowBreadCrumbs = true
  ShowPostNavLinks = true
  ShowShareButtons = true
  mainSections = ["papers", "notes", "code", "projects"]
  comments = true

  # ✅ 수식(KaTeX) — PaperMod가 지원
  math = true

  # ✅ 검색(검색 버튼 + 인덱스 생성)
  ShowSearch = true

  [params.homeHero]
    title = "Research notes, project logs, and technical writeups"
    intro = "A personal lab notebook for ML, electromagnetics, simulations, and code. Start from a section, search across the site, or jump into the newest writing."
    primaryButtonText = "Browse Projects"
    primaryButtonURL = "/projects/"
    secondaryButtonText = "Read Papers"
    secondaryButtonURL = "/papers/"

  [params.sidebarProfile]
    name = "Hyul"
    role = "Student, builder, and research-oriented note taker"
    location = "Seoul, South Korea"
    email = "you@example.com"
    summary = "Interested in AI, inverse problems, computational electromagnetics, and learning in public."
    focusTitle = "Current Focus"
    focusItems = ["GPR study notes", "NeRF and 3D vision", "Simulation workflows", "Technical writing archive"]

  [params.giscus]
    repo = ""
    repoID = ""
    category = "General"
    categoryID = ""
    mapping = "pathname"
    strict = "0"
    reactionsEnabled = "1"
    emitMetadata = "0"
    inputPosition = "top"
    theme = "preferred_color_scheme"
    lang = "ko"

[outputs]
  home = ["HTML", "RSS", "JSON"]  # 검색용 JSON 필요

[[menu.main]]
  name = "Papers"
  url = "/papers/"
  weight = 1

[[menu.main]]
  name = "Notes"
  url = "/notes/"
  weight = 2

[[menu.main]]
  name = "Code"
  url = "/code/"
  weight = 3

[[menu.main]]
  name = "Projects"
  url = "/projects/"
  weight = 4

[[menu.main]]
  name = "Search"
  url = "/search/"
  weight = 9
